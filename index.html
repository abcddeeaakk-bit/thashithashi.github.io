<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALTH QUEST</title>

```
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
```

</head>

<body>

<header>
    <h1>⚔️ HEALTH QUEST</h1>
    <p>勇者 とーる × AI秘書 アリス</p>
</header>

<div class="container">

```
<section class="card hero">

    <div>
        <h2>勇者ステータス</h2>

        <div class="status-row">
            <div>
                <span>Lv.</span>
                <h3 id="level">1</h3>
            </div>

            <div>
                <span>戦闘力</span>
                <h3 id="power">0</h3>
            </div>
        </div>

        <div class="title-box">
            称号：
            <span id="titleName">
                運動初心者
            </span>
        </div>

        <div class="streak-box">
            🔥連続記録
            <span id="streak">
                0
            </span>日
        </div>

    </div>

</section>

<section class="card">

    <h2>本日の記録</h2>

    <label>体重(kg)</label>
    <input id="weight" type="number">

    <label>筋トレ時間(分)</label>
    <input id="training" type="number">

    <label>有酸素時間(分)</label>
    <input id="cardio" type="number">

    <button onclick="saveData()">
        記録する
    </button>

</section>

<section class="card alice-card">

    <h2>🤖 AI秘書 アリス</h2>

    <div class="alice-avatar">
        👩
    </div>

    <p id="aliceMessage">
        おはようございます♪
        今日も健康への冒険を始めましょう！
    </p>

</section>

<section class="card">

    <h2>📊 体重推移</h2>

    <canvas id="weightChart"></canvas>

</section>

<section class="card">

    <h2>⚔️ RPGステータス</h2>

    <div class="stats">

        <div>
            STR
            <span id="str">10</span>
        </div>

        <div>
            VIT
            <span id="vit">10</span>
        </div>

        <div>
            AGI
            <span id="agi">10</span>
        </div>

        <div>
            INT
            <span id="int">10</span>
        </div>

    </div>

</section>
```

</div>

<script src="app.js"></script>

</body>
</html>
